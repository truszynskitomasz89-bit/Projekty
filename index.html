}

h1 {

}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card h3 {
  margin-top: 0;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}
</style>

</head>
<body>

<h1>Moje projekty</h1>

<div class="grid">

  <div class="card">
    <h3>Solo Fitness</h3>
    <p>System fitness</p>
    <a class="btn" href="solo-leveling-fitness.html">Otwórz</a>
  </div>

  <div class="card">
    <h3>Kuchnia PWA</h3>
    <p>Aplikacja kuchni</p>

</div>

</body>
</html>
