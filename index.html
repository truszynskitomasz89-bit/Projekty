<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projekty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b1020;
      --bg2: #121933;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.12);
      --text: #f3f6ff;
      --muted: #a9b4d0;
      --accent: #6ea8fe;
      --accent2: #8b5cf6;
      --btn: #ffffff;
      --btn-text: #0b1020;
      --shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(110,168,254,0.20), transparent 30%),
        radial-gradient(circle at top right, rgba(139,92,246,0.20), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .container {
      width: min(1200px, 100%);
      margin: 0 auto;
    }

    .hero {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 34px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    h1 {
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -1.8px;
    }

    .hero p {
      max-width: 760px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .topbar {
      margin-top: 8px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .mini-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 12px 16px;
      min-width: 150px;
      backdrop-filter: blur(8px);
    }

    .mini-box .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .mini-box .value {
      font-size: 20px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(16px);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .project-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(110,168,254,0.20), rgba(139,92,246,0.26));
      border: 1px solid rgba(255,255,255,0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .status {
      font-size: 12px;
      color: #d8e3ff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 7px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .card h3 {
      font-size: 22px;
      line-height: 1.2;
      margin-bottom: 2px;
    }

    .card p {
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
      min-height: 72px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      font-size: 12px;
      color: #dce6ff;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 10px;
      border-radius: 999px;
    }

    .actions {
      margin-top: auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.18s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--btn);
      color: var(--btn-text);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-secondary {
      color: var(--text);
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
    }

    .footer-note {
      margin-top: 34px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 700px) {
      body {
        padding: 24px 14px 40px;
      }

      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .card p {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <section class="hero">
      <span class="badge">📁 Panel projektów</span>
      <h1>Moje projekty</h1>
      <p>
        Główna strona do otwierania wszystkich aplikacji, stron i prototypów.
        Każdy projekt ma własny link, własny plik i może być aktualizowany niezależnie.
      </p>

      <div class="topbar">
        <div class="mini-box">
          <span class="label">Liczba projektów</span>
          <span class="value" id="project-count">0</span>
        </div>
        <div class="mini-box">
          <span class="label">Typ</span>
          <span class="value">HTML / PWA</span>
        </div>
        <div class="mini-box">
          <span class="label">Status</span>
          <span class="value">Online</span>
        </div>
      </div>
    </section>

    <section class="grid" id="projects-grid"></section>

    <div class="footer-note">
      Dashboard projektów • GitHub Pages
    </div>
  </div>

  <script>
    const projects = [
      {
        name: "Solo Leveling Fitness",
        description: "System fitness i zarządzania progresją. Panel projektu z nowoczesnym interfejsem.",
        link: "solo-leveling-fitness.html",
        icon: "🏋️",
        status: "Gotowy",
        tags: ["Fitness", "Panel", "HTML"]
      },
      {
        name: "Kuchnia PWA",
        description: "Aplikacja kuchni dostępna przez przeglądarkę. Możesz tutaj podpiąć swój kolejny projekt.",
        link: "kuchnia-pwa.html",
        icon: "🍳",
        status: "W trakcie",
        tags: ["PWA", "Kuchnia", "Aplikacja"]
      }
    ];

    const grid = document.getElementById("projects-grid");
    const count = document.getElementById("project-count");

    count.textContent = projects.length;

    projects.forEach(project => {
      const card = document.createElement("article");
      card.className = "card";

      const tagsHtml = project.tags
        .map(tag => `<span class="chip">${tag}</span>`)
        .join("");

      card.innerHTML = `
        <div class="card-top">
          <div class="project-icon">${project.icon}</div>
          <div class="status">${project.status}</div>
        </div>

        <div>
          <h3>${project.name}</h3>
        </div>

        <p>${project.description}</p>

        <div class="meta">
          ${tagsHtml}
        </div>

        <div class="actions">
          <a class="btn btn-primary" href="${project.link}">Otwórz projekt</a>
          <a class="btn btn-secondary" href="${project.link}" target="_blank">Nowa karta</a>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
